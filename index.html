    <!-- Initialisation du thème avant le rendu -->
    <script>
        (function () {
            let savedTheme = null;
            try {
                savedTheme = localStorage.getItem('theme');
            } catch (_error) {
                savedTheme = null;
            }

            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            }

            const homeLoaderStorageKey = 'home-loader-seen-v1';
            const isHomePath = /(^\/$|\/index\.html$)/.test(window.location.pathname);
            let hasSeenLoader = false;
            try {
                hasSeenLoader = sessionStorage.getItem(homeLoaderStorageKey) === '1';
            } catch (_error) {
                hasSeenLoader = false;
            }

            if (isHomePath && !hasSeenLoader) {
                document.documentElement.classList.add('first-visit-loading');
                window.__showHomeFirstLoader = true;
            }

            window.__homeLoaderStorageKey = homeLoaderStorageKey;
        })();
    </script>

    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
